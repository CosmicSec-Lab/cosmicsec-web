name: 🤖 Advanced Auto-Fix & Enhancement Pipeline

on:
  push:
    branches: [master, main, develop, 'feature/**']
  pull_request:
    branches: [master, main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: write
  statuses: write
  repository-projects: write

jobs:
  # Stage 1: Analysis
  analyze:
    name: 🔍 Code Analysis
    runs-on: ubuntu-latest
    outputs:
      issues-found: ${{ steps.analysis.outputs.issues-found }}
      analysis-available: ${{ steps.analysis.outputs.analysis-available }}

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

       - name: 🔍 Detect Project Languages
        id: detect
        run: |
          echo "=== Language Detection ==="
          
          # Python detection
          if find . -name "*.py" -not -path "./.venv/*" -not -path "./node_modules/*" -not -path "./.git/*" | grep -q .; then
            echo "has-python=true" >> $GITHUB_OUTPUT
            echo "✅ Python detected"
          else
            echo "has-python=false" >> $GITHUB_OUTPUT
            echo "❌ No Python files"
          fi
          
          # Node.js detection (search all subdirectories)
          if find . -name "package.json" -not -path "./node_modules/*" -not -path "./.git/*" | grep -q .; then
            echo "has-node=true" >> $GITHUB_OUTPUT
            echo "✅ Node.js detected"
            
            # Store all package.json locations
            locations=$(find . -name "package.json" -not -path "./node_modules/*" -not -path "./.git/*" | tr '\n' ',')
            echo "package-json-locations=$locations" >> $GITHUB_OUTPUT
          else
            echo "has-node=false" >> $GITHUB_OUTPUT
            echo "❌ No Node.js projects"
          fi

      - name: 🐍 Setup Python
        if: steps.detect.outputs.has-python == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 🟢 Setup Node.js
        if: steps.detect.outputs.has-node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

       - name: 📦 Install Python Analysis Tools
        if: steps.detect.outputs.has-python == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install \
            pylint black isort flake8 bandit safety mypy pytest \
            pytest-cov radon vulture autoflake autopep8 requests

      - name: 📦 Install Node Analysis Tools
        if: steps.detect.outputs.has-node == 'true'
        run: |
          npm install -g \
            eslint prettier markdownlint-cli \
            @typescript-eslint/parser @typescript-eslint/eslint-plugin

      - name: 🔍 Run Analysis
        id: analysis
        continue-on-error: true
        run: |
          mkdir -p analysis-reports
          
          # Python Analysis (at repo root)
          if [ "${{ steps.detect.outputs.has-python }}" = "true" ]; then
            echo "=== PYLINT ===" >> analysis-reports/pylint.txt
            find . -name "*.py" -not -path "./.venv/*" -not -path "./__pycache__/*" -not -path "./node_modules/*" | head -50 | xargs pylint --exit-zero --output-format=json > analysis-reports/pylint.json 2>&1 || true
            
            echo "=== FLAKE8 ===" >> analysis-reports/flake8.txt
            find . -name "*.py" -not -path "./.venv/*" -not -path "./__pycache__/*" -not -path "./node_modules/*" | head -50 | xargs flake8 --format=json > analysis-reports/flake8.json 2>&1 || true
            
            echo "=== BANDIT ===" >> analysis-reports/bandit.txt
            bandit -r . -x .venv,__pycache__,node_modules -f json > analysis-reports/bandit.json 2>&1 || true
            
            echo "=== MYPY ===" >> analysis-reports/mypy.txt
            mypy . --ignore-missing-imports --json > analysis-reports/mypy.json 2>&1 || true
            
            echo "=== RADON ===" >> analysis-reports/radon.txt
            radon cc . --json > analysis-reports/radon.json 2>&1 || true
          fi
          
          # Node.js Analysis (for each package.json found)
          if [ "${{ steps.detect.outputs.has-node }}" = "true" ]; then
            echo "🔍 Scanning for package.json files..."
            
            # Find all package.json files
            for pkg_file in $(find . -name "package.json" -not -path "./node_modules/*" -not -path "./.git/*"); do
              dir=$(dirname "$pkg_file")
              echo ""
              echo "📦 Processing: $dir"
              
              cd "$dir"
              
              # Only install if node_modules doesn't exist or package-lock is newer
              if [ ! -d "node_modules" ] || [ "package-lock.json" -nt "node_modules" ] || [ "yarn.lock" -nt "node_modules" ]; then
                echo "  Installing dependencies..."
                if [ -f "package-lock.json" ]; then
                  npm ci --prefer-offline --no-audit 2>/dev/null || npm install --prefer-offline --no-audit 2>/dev/null || true
                else
                  npm install --prefer-offline --no-audit 2>/dev/null || true
                fi
              else
                echo "  Dependencies already installed, skipping..."
              fi
              
              # Run ESLint if available
              if [ -f ".eslintrc.json" ] || [ -f ".eslintrc.js" ] || [ -f ".eslintrc.yml" ]; then
                echo "  Running ESLint..."
                npx eslint . --format json > "$OLDPWD/analysis-reports/eslint-$(basename "$dir").json" 2>/dev/null || echo "[]" > "$OLDPWD/analysis-reports/eslint-$(basename "$dir").json"
              fi
              
              # Run npm audit
              echo "  Running npm audit..."
              npm audit --json > "$OLDPWD/analysis-reports/npm-audit-$(basename "$dir").json" 2>/dev/null || echo "{}" > "$OLDPWD/analysis-reports/npm-audit-$(basename "$dir").json"
              
              cd - > /dev/null
            done
          fi
          
          echo "analysis-available=true" >> $GITHUB_OUTPUT
          ISSUES=$(find analysis-reports -name "*.json" 2>/dev/null | wc -l)
          echo "issues-found=${ISSUES}" >> $GITHUB_OUTPUT

      - name: 💾 Upload Analysis Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-analysis-reports
          path: analysis-reports/
          retention-days: 30

  # Stage 2: Auto-Fixing
  auto-fix:
    name: 🔧 Auto-Fix
    runs-on: ubuntu-latest
    needs: analyze
    if: needs.analyze.outputs.analysis-available == 'true'
    outputs:
      fixes-applied: ${{ steps.fixing.outputs.fixes-applied }}

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Tools
        run: |
          python -m pip install --upgrade pip
          pip install black isort autoflake autopep8
          npm install -g prettier eslint

       - name: 🔧 Run Auto-Fix Script
        id: fixing
        continue-on-error: true
        run: |
          mkdir -p fixed-code
          
          # Python fixes (root level)
          if [ "${{ steps.detect.outputs.has-python }}" = "true" ]; then
            echo "[*] Running Black formatter..."
            black . --line-length=120 --exclude '.venv' || true
            
            echo "[*] Running isort..."
            isort . --profile black --line-length=120 --skip '.venv' || true
            
            echo "[*] Running autoflake..."
            autoflake --in-place --remove-all-unused-imports --recursive . --exclude '.venv' || true
            
            echo "[*] Running autopep8..."
            autopep8 --in-place --aggressive --aggressive --recursive . --exclude '.venv' || true
          fi
          
          # JavaScript fixes (for each Node.js project)
          if [ "${{ steps.detect.outputs.has-node }}" = "true" ]; then
            for pkg_file in $(find . -name "package.json" -not -path "./node_modules/*" -not -path "./.git/*"); do
              dir=$(dirname "$pkg_file")
              echo "[*] Processing Node.js project in: $dir"
              
              cd "$dir"
              
              # Prettier formatting
              if command -v npx &> /dev/null; then
                echo "  Running Prettier..."
                npx prettier --write "." 2>/dev/null || true
              fi
              
              # ESLint fixes
              if [ -f ".eslintrc.json" ] || [ -f ".eslintrc.js" ] || [ -f ".eslintrc.yml" ]; then
                echo "  Running ESLint fixes..."
                npx eslint . --fix 2>/dev/null || true
              fi
              
              cd - > /dev/null
            done
          fi
          
          echo "fixes-applied=$(git diff --name-only | wc -l)" >> $GITHUB_OUTPUT

      - name: ✅ Commit Auto-Fixes
        if: github.event_name == 'push' && steps.fixing.outputs.fixes-applied > 0
        continue-on-error: true
        run: |
          git config --local user.email "🤖@cosmicsec.dev"
          git config --local user.name "🤖 CosmicSec Auto-Fixer"
          
          changes=$(git status -s)
          if [ -n "$changes" ]; then
            git add -A
            git commit -m "🤖 chore: Auto-fix formatting and code quality

- Applied Black, isort, and autoflake for Python (if present)
- Applied Prettier and ESLint fixes for JavaScript/TypeScript
- Automated code style normalization
- No functional changes" || true
            
            git push origin HEAD:${{ github.ref }} || true
          fi

  # Stage 3: Enhancements
  enhance:
    name: ✨ Enhancements
    runs-on: ubuntu-latest
    needs: analyze
    if: needs.analyze.outputs.analysis-available == 'true'
    outputs:
      improvements-found: ${{ steps.enhancement.outputs.improvements-found }}

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: ✨ Generate Enhancement Report
        id: enhancement
        run: |
          python .github/scripts/code_enhancer.py \
            --source-dir . \
            --output-enhancements enhancements.json || true
          
          if [ -f "enhancements.json" ]; then
            IMPROVEMENTS=$(python -c "import json; data = json.load(open('enhancements.json')); print(data.get('total_improvements', 0))")
            echo "improvements-found=${IMPROVEMENTS}" >> $GITHUB_OUTPUT
          fi

      - name: 💾 Upload Enhancements
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enhancements-report
          path: enhancements.json
          retention-days: 30

  # Stage 4: Testing
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: auto-fix
    continue-on-error: true

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: |
          # Install Python dependencies if present
          if [ -f "pyproject.toml" ] || [ -f "setup.py" ]; then
            python -m pip install --upgrade pip
            pip install -e . 2>/dev/null || true
            pip install pytest pytest-cov 2>/dev/null || true
          fi
          
          # Install Node.js dependencies for all projects
          for pkg_file in $(find . -name "package.json" -not -path "./node_modules/*" -not -path "./.git/*"); do
            dir=$(dirname "$pkg_file")
            echo "Installing dependencies in: $dir"
            cd "$dir"
            if [ -f "package-lock.json" ]; then
              npm ci 2>/dev/null || npm install 2>/dev/null || true
            else
              npm install 2>/dev/null || true
            fi
            cd - > /dev/null
          done

      - name: 🧪 Run Tests
        continue-on-error: true
        run: |
          # Python tests
          if [ -f "pyproject.toml" ] || [ -f "setup.py" ]; then
            echo "Running Python tests..."
            pytest tests/ -v --tb=short 2>/dev/null || echo "No Python tests found"
          fi
          
          # Node.js tests for each project
          for pkg_file in $(find . -name "package.json" -not -path "./node_modules/*" -not -path "./.git/*"); do
            dir=$(dirname "$pkg_file")
            echo "Running tests in: $dir"
            cd "$dir"
            if [ -f "package.json" ]; then
              # Check if test script exists
              if node -e "const p=require('./package.json'); process.exit(!(p.scripts && p.scripts.test));" 2>/dev/null; then
                npm test 2>/dev/null || echo "Tests failed or no tests in $dir"
              else
                echo "No test script defined in $dir"
              fi
            fi
            cd - > /dev/null
          done

  # Stage 5: Quality Report
  report:
    name: 📊 Quality Report
    runs-on: ubuntu-latest
    needs: analyze
    if: always()

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📥 Download Analysis Reports
        uses: actions/download-artifact@v4
        with:
          name: code-analysis-reports
          path: analysis-reports

      - name: 📊 Generate Quality Report
        run: |
          python .github/scripts/generate_quality_report.py \
            --analysis-dir analysis-reports \
            --output-file quality-report.md || true

      - name: 📤 Upload Quality Report
        uses: actions/upload-artifact@v4
        with:
          name: quality-report
          path: quality-report.md
          retention-days: 30

  # Stage 6: Summary
  summary:
    name: 📋 Summary
    runs-on: ubuntu-latest
    needs: [analyze, auto-fix, enhance]
    if: always()

    steps:
      - name: 📊 Create Job Summary
        run: |
          echo "## 🤖 Auto-Fix & Enhancement Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Analysis | ✅ | ${{ needs.analyze.outputs.issues-found }} issues found |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔧 Auto-Fix | ✅ | Fixes applied |" >> $GITHUB_STEP_SUMMARY
          echo "| ✨ Enhancements | ✅ | ${{ needs.enhance.outputs.improvements-found }} improvements |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "- Review auto-fixes" >> $GITHUB_STEP_SUMMARY
          echo "- Check quality report" >> $GITHUB_STEP_SUMMARY
          echo "- Run tests locally" >> $GITHUB_STEP_SUMMARY
