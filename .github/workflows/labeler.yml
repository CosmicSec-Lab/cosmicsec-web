name: "Issue Auto-Labeler"
on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/github-script@v7
      with:
        script: |
          const issue = context.payload.issue;
          const title = issue.title.toLowerCase();
          const body = (issue.body || "").toLowerCase();
          const labels = [];
          
          if (title.includes('bug') || title.includes('fix') || title.includes('error')) labels.push('bug');
          if (title.includes('feature') || title.includes('enhancement')) labels.push('enhancement');
          if (title.includes('docs') || title.includes('documentation')) labels.push('documentation');
          if (title.includes('epic') || title.includes('vision')) labels.push('epic');
          
          if (labels.length > 0) {
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: labels
            });
          }
