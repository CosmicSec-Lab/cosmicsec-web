name: 📋 Auto-Sync & Update Project

on:
  issues:
    types: [opened, closed, reopened, labeled]
  pull_request:
    types: [opened, closed, reopened, ready_for_review]
  workflow_run:
    workflows: ["🤖 Advanced Auto-Fix & Enhancement Pipeline"]
    types: [completed]

env:
  PROJECT_NUMBER: 2
  ORG_NAME: CosmicSec-Lab

jobs:
  # Job 0: Duplicate Detection and Cleanup
  duplicate_check:
    name: 🧠 Duplicate Detection
    runs-on: ubuntu-latest
    if: always()
    outputs:
      is_duplicate: ${{ steps.detect.outputs.is_duplicate }}
      canonical_number: ${{ steps.detect.outputs.canonical_number }}
      canonical_url: ${{ steps.detect.outputs.canonical_url }}

    steps:
      - name: 🔎 Compare against repo issues and project items
        id: detect
        uses: actions/github-script@v7
        env:
          PROJECT_NUMBER: ${{ env.PROJECT_NUMBER }}
          ORG_NAME: ${{ env.ORG_NAME }}
        with:
          script: |
            if (context.eventName !== 'issues' || context.payload.action !== 'opened') {
              core.setOutput('is_duplicate', 'false');
              core.setOutput('canonical_number', '');
              core.setOutput('canonical_url', '');
              return;
            }

            const normalize = (value) => value
              .toLowerCase()
              .replace(/[^a-z0-9]+/g, ' ')
              .split(' ')
              .filter(Boolean)
              .filter(word => !['the','a','an','and','or','for','to','of','in','on','with','fix','issue','bug','task','feature','request'].includes(word))
              .join(' ');

            const overlapScore = (a, b) => {
              const left = new Set(normalize(a).split(' '));
              const right = new Set(normalize(b).split(' '));
              let overlap = 0;
              for (const token of left) if (right.has(token)) overlap += 1;
              return overlap;
            };

            const current = context.payload.issue;
            const currentTitle = current.title || '';
            const currentNormalized = normalize(currentTitle);
            const currentLabels = (current.labels || []).map(label => label.name.toLowerCase());

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            const repoCandidates = openIssues
              .filter(issue => issue.number !== current.number && !issue.pull_request)
              .map(issue => ({
                number: issue.number,
                title: issue.title || '',
                url: issue.html_url,
                labels: (issue.labels || []).map(label => label.name.toLowerCase())
              }));

            let canonical = null;
            for (const candidate of repoCandidates) {
              const candidateNormalized = normalize(candidate.title);
              const sameTitle = candidateNormalized === currentNormalized;
              const closeTitle = candidateNormalized.includes(currentNormalized) || currentNormalized.includes(candidateNormalized);
              const sharedLabels = candidate.labels.filter(label => currentLabels.includes(label)).length;
              const labelMatched = sharedLabels >= 2 && candidate.labels.some(label => label.startsWith('type-') || label.startsWith('component-'));
              const relatedTitle = overlapScore(candidate.title, currentTitle) >= 2;

              if (sameTitle || closeTitle || labelMatched || relatedTitle) {
                canonical = candidate;
                break;
              }
            }

            let currentProjectItemId = null;
            let canonicalProjectItemId = null;

            try {
              const projectData = await github.graphql(`
                query($org: String!, $number: Int!) {
                  organization(login: $org) {
                    projectV2(number: $number) {
                      id
                      items(first: 100) {
                        nodes {
                          id
                          content {
                            __typename
                            ... on Issue {
                              id
                              number
                              title
                              url
                            }
                          }
                        }
                      }
                    }
                  }
                }
              `, {
                org: process.env.ORG_NAME,
                number: Number(process.env.PROJECT_NUMBER)
              });

              const items = projectData.organization?.projectV2?.items?.nodes || [];
              for (const item of items) {
                const issue = item.content;
                if (!issue) continue;
                if (issue.number === current.number) currentProjectItemId = item.id;
                if (canonical && issue.number === canonical.number) canonicalProjectItemId = item.id;
              }
            } catch (error) {
              console.log(`Project query skipped: ${error.message}`);
            }

            if (canonical) {
              const comment = `♻️ Duplicate detected. This issue matches #${canonical.number}: ${canonical.url}\n\nClosing this issue to keep the repository and project board clean.`;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: current.number,
                body: comment
              });

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: current.number,
                state: 'closed',
                state_reason: 'duplicate'
              });

              if (currentProjectItemId) {
                try {
                  await github.graphql(`mutation($projectId: ID!, $itemId: ID!) { deleteProjectV2Item(input: {projectId: $projectId, itemId: $itemId}) { deletedItemId } }`, {
                    projectId: (await github.graphql(`query($org: String!, $number: Int!) { organization(login: $org) { projectV2(number: $number) { id } } }`, { org: process.env.ORG_NAME, number: Number(process.env.PROJECT_NUMBER) })).organization.projectV2.id,
                    itemId: currentProjectItemId
                  });
                } catch (error) {
                  console.log(`Project item removal skipped: ${error.message}`);
                }
              }

              core.setOutput('is_duplicate', 'true');
              core.setOutput('canonical_number', String(canonical.number));
              core.setOutput('canonical_url', canonical.url);
              return;
            }

            core.setOutput('is_duplicate', 'false');
            core.setOutput('canonical_number', '');
            core.setOutput('canonical_url', '');

  # Job 1: Add to Project
  add-to-project:
    name: 📥 Add Issue/PR to Project
    runs-on: ubuntu-latest
    needs: duplicate_check
    if: github.event_name != 'workflow_run' && needs.duplicate_check.outputs.is_duplicate != 'true'

    steps:
      - name: 📋 Add Issue to Project
        if: github.event_name == 'issues'
        uses: actions/add-to-project@v1.0.1
        with:
          github-token: ${{ secrets.ORG_PROJECT_PAT || secrets.GITHUB_TOKEN }}
          project-url: https://github.com/orgs/CosmicSec-Lab/projects/${{ env.PROJECT_NUMBER }}

      - name: 📋 Add PR to Project
        if: github.event_name == 'pull_request'
        uses: actions/add-to-project@v1.0.1
        with:
          github-token: ${{ secrets.ORG_PROJECT_PAT || secrets.GITHUB_TOKEN }}
          project-url: https://github.com/orgs/CosmicSec-Lab/projects/${{ env.PROJECT_NUMBER }}

  # Job 2: Update Status
  update-status:
    name: 🔄 Update Project Status
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 🔄 Determine Status
        id: status
        run: |
          if [ "${{ github.event.action }}" == "closed" ]; then
            echo "project-status=Done" >> $GITHUB_OUTPUT
            echo "status-emoji=✅" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.action }}" == "ready_for_review" ]; then
            echo "project-status=In Review" >> $GITHUB_OUTPUT
            echo "status-emoji=👀" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.action }}" == "opened" ]; then
            echo "project-status=To do" >> $GITHUB_OUTPUT
            echo "status-emoji=📝" >> $GITHUB_OUTPUT
          else
            echo "project-status=In Progress" >> $GITHUB_OUTPUT
            echo "status-emoji=🔄" >> $GITHUB_OUTPUT
          fi

      - name: 📤 Create Issue Comment
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '📋 Added to project: [CosmicSec Project](https://github.com/orgs/CosmicSec-Lab/projects/${{ env.PROJECT_NUMBER }})\n' +
                '⏱️ Status: ${{ steps.status.outputs.status-emoji }} ${{ steps.status.outputs.project-status }}'
            })

  # Job 3: Auto-Label
  auto-label:
    name: 🏷️ Auto-Label Issues
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'opened'

    steps:
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 🏷️ Analyze & Label
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            const labels = [];
            
            // Severity labels
            if (body.includes('Critical') || body.includes('critical')) labels.push('severity-critical');
            else if (body.includes('High') || body.includes('high')) labels.push('severity-high');
            else if (body.includes('Medium') || body.includes('medium')) labels.push('severity-medium');
            else if (body.includes('Low') || body.includes('low')) labels.push('severity-low');
            
            // Type labels
            if (body.includes('Bug') || body.includes('bug')) labels.push('type-bug');
            if (body.includes('Feature') || body.includes('feature')) labels.push('type-enhancement');
            if (body.includes('Security') || body.includes('security')) labels.push('type-security');
            if (body.includes('Documentation') || body.includes('documentation')) labels.push('type-docs');
            
            // Component labels
            if (body.includes('Frontend') || body.includes('frontend') || body.includes('UI')) labels.push('component-frontend');
            if (body.includes('Backend') || body.includes('backend') || body.includes('API')) labels.push('component-backend');
            if (body.includes('Database') || body.includes('database')) labels.push('component-database');
            
            // Remove duplicates and add
            const uniqueLabels = [...new Set(labels)];
            if (uniqueLabels.length > 0) {
              github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: uniqueLabels
              });
              
              console.log(`Added labels: ${uniqueLabels.join(', ')}`);
            }

  # Job 4: Link Related Issues
  link-issues:
    name: 🔗 Link Related Issues
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'opened'

    steps:
      - name: 🔗 Extract Issue References
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const issueRegex = /#(\d+)/g;
            const matches = [...body.matchAll(issueRegex)];
            
            if (matches.length > 0) {
              console.log(`Found ${matches.length} linked issues`);
              const issueNum = matches[0][1];
              
              // Create comment on original issue
              github.rest.issues.createComment({
                issue_number: parseInt(issueNum),
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `🔗 Linked PR: #${{ github.event.pull_request.number }}`
              });
            }

  # Job 5: Report Workflow Results
  report-results:
    name: 📊 Report Workflow Results
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_run'

    steps:
      - name: 📥 Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: workflow-artifacts
          name: code-analysis-reports
        continue-on-error: true

      - name: 📊 Create Summary Comment
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            // Find PR associated with this workflow run
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: context.payload.workflow_run.head_branch
            });
            
            if (prs.data.length > 0) {
              const pr = prs.data[0];
              github.rest.issues.createComment({
                issue_number: pr.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '## 🤖 Auto-Fix Pipeline Complete\n\n' +
                      '✅ Code analysis and auto-fixing completed\n' +
                      '📊 Check workflow artifacts for detailed reports\n' +
                      '🔗 [View in Project](https://github.com/orgs/CosmicSec-Lab/projects/2)'
              });
            }
