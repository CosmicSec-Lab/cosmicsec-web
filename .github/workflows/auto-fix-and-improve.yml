name: 🤖 Auto-Fix & Enhancement Pipeline

on:
  push:
    branches: [master, main, develop, 'feature/**']
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  analyze-and-fix:
    name: 🔍 Frontend Analysis & Auto-Fix
    runs-on: ubuntu-latest
    outputs:
      issues-found: ${{ steps.analysis.outputs.issues-found }}
      fixes-applied: ${{ steps.fixing.outputs.fixes-applied }}
      
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

       - name: 📦 Install Dependencies
         run: |
           echo "=== Installing dependencies for all Node.js projects ==="
           
           # Find all package.json files (excluding node_modules and .git)
           for pkg_file in $(find . -name "package.json" -not -path "./node_modules/*" -not -path "./.git/*"); do
             dir=$(dirname "$pkg_file")
             echo "📦 Installing in: $dir"
             
             cd "$dir"
             
             # Check for lock file
             if [ -f "package-lock.json" ]; then
               echo "  Using npm ci..."
               npm ci --prefer-offline --no-audit 2>/dev/null || npm install --prefer-offline --no-audit 2>/dev/null || true
             elif [ -f "yarn.lock" ]; then
               echo "  Using yarn..."
               yarn install --frozen-lockfile 2>/dev/null || yarn install 2>/dev/null || true
             else
               echo "  Using npm install..."
               npm install --prefer-offline --no-audit 2>/dev/null || true
             fi
             
             cd - > /dev/null
           done
           
           # Install global tools
           npm install -g prettier eslint markdownlint-cli 2>/dev/null || true

      - name: 🔍 Run Code Quality Checks
        id: analysis
        continue-on-error: true
        run: |
          mkdir -p analysis-reports
          
          echo "🔍 Scanning for Node.js projects..."
          
          # Find all package.json files
          for pkg_file in $(find . -name "package.json" -not -path "./node_modules/*" -not -path "./.git/*"); do
            dir=$(dirname "$pkg_file")
            proj_name=$(basename "$dir")
            echo ""
            echo "📦 Processing: $dir"
            
            cd "$dir"
            
            # Install dependencies if needed
            if [ ! -d "node_modules" ] || [ "package-lock.json" -nt "node_modules" ] || [ "yarn.lock" -nt "node_modules" ]; then
              echo "  Installing dependencies..."
              if [ -f "package-lock.json" ]; then
                npm ci --prefer-offline --no-audit 2>/dev/null || npm install --prefer-offline --no-audit 2>/dev/null || true
              else
                npm install --prefer-offline --no-audit 2>/dev/null || true
              fi
            fi
            
            # ESLint analysis
            if [ -f ".eslintrc.json" ] || [ -f ".eslintrc.js" ] || [ -f ".eslintrc.yml" ]; then
              echo "  Running ESLint..."
              npx eslint . --format json > "$OLDPWD/analysis-reports/eslint-${proj_name}.json" 2>/dev/null || echo "[]" > "$OLDPWD/analysis-reports/eslint-${proj_name}.json"
            fi
            
            # Prettier check
            echo "=== PRETTIER CHECK ===" > "$OLDPWD/analysis-reports/prettier-${proj_name}.txt"
            npx prettier --check "." 2>&1 | head -100 >> "$OLDPWD/analysis-reports/prettier-${proj_name}.txt" 2>/dev/null || true
            
            # npm audit
            echo "  Running npm audit..."
            npm audit --json > "$OLDPWD/analysis-reports/npm-audit-${proj_name}.json" 2>/dev/null || echo "{}" > "$OLDPWD/analysis-reports/npm-audit-${proj_name}.json"
            
            cd - > /dev/null
          done
          
          # Count issues
          ISSUES=0
          for f in analysis-reports/*.json; do
            if [ -f "$f" ]; then
              count=$(cat "$f" | python3 -c "import sys,json; data=json.load(sys.stdin); print(len(data) if isinstance(data, list) else 1)" 2>/dev/null || echo 0)
              ISSUES=$((ISSUES + count))
            fi
          done 2>/dev/null || true
          
          echo "issues-found=${ISSUES}" >> $GITHUB_OUTPUT

      - name: 🤖 AI Enhancement Suggestions
        id: fixing
        continue-on-error: true
        run: |
          echo "fixes-applied=0" > .fix-counter.txt
          echo "fixes-applied=0" >> $GITHUB_OUTPUT

      - name: 🚀 Apply Auto-Formatting
        continue-on-error: true
        run: |
          echo "Running Prettier and ESLint on all Node.js projects..."
          
          # Find all package.json files
          for pkg_file in $(find . -name "package.json" -not -path "./node_modules/*" -not -path "./.git/*"); do
            dir=$(dirname "$pkg_file")
            echo "📦 Processing: $dir"
            
            cd "$dir"
            
            echo "  Running Prettier..."
            npx prettier --write "." 2>/dev/null || true
            
            echo "  Running ESLint auto-fix..."
            if [ -f ".eslintrc.json" ] || [ -f ".eslintrc.js" ] || [ -f ".eslintrc.yml" ]; then
              npx eslint . --fix 2>/dev/null || true
            fi
            
            cd - > /dev/null
          done

      - name: 💾 Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-analysis-reports
          path: |
            analysis-reports/
          retention-days: 30

      - name: ✅ Commit Auto-Fixes
        if: github.event_name == 'push'
        continue-on-error: true
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "🤖 CosmicSec Web Auto-Fixer"
          
          if [[ ! -z $(git status -s) ]]; then
            git add -A
            git commit -m "🤖 Auto-fix: Frontend code formatting and optimization" \
              -m "- Applied Prettier formatting
              - Fixed ESLint issues
              - Improved code style"
            git push origin HEAD:${{ github.ref }}
          fi

      - name: 📋 Comment Results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const issuesFound = '${{ steps.analysis.outputs.issues-found }}';
            const fixesApplied = '${{ steps.fixing.outputs.fixes-applied }}';
            
            let comment = `## 🤖 CosmicSec Web Auto-Analysis Report\n\n`;
            comment += `### 📊 Summary\n`;
            comment += `- **Files Analyzed**: ${issuesFound}\n`;
            comment += `- **Fixes Applied**: ${fixesApplied}\n\n`;
            comment += `[View Full Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  create-improvement-pr:
    name: 🚀 Create Enhancement PR
    runs-on: ubuntu-latest
    needs: analyze-and-fix
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    continue-on-error: true
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📦 Generate Enhancement PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "# 🚀 CosmicSec Web Enhancement PR\n\nGenerated by AI pipeline." > improvements-pr.md

      - name: 📝 Create PR
        if: hashFiles('improvements-pr.md') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚀 CosmicSec Web Enhancement: Auto-Generated Improvements',
              body: fs.readFileSync('improvements-pr.md', 'utf8'),
              head: `enhancement/ai-improvements-${Date.now()}`,
              base: 'master'
            });

  file-issues:
    name: 📋 File Issues for Complex Problems
    runs-on: ubuntu-latest
    needs: analyze-and-fix
    if: always()
    continue-on-error: true
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      - name: 📌 Create GitHub Issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              [
                {title: "🔧 Improve Component Structure", body: "Refactor components for better maintainability", labels: ["refactor"]},
                {title: "🎨 Enhance UI/UX", body: "Improve user interface and experience", labels: ["enhancement"]}
              ].forEach(issue => {
                github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: issue.title,
                  body: issue.body,
                  labels: issue.labels
                });
              });
            } catch(e) {}

  notify-results:
    name: 📢 Notification
    runs-on: ubuntu-latest
    needs: [analyze-and-fix, create-improvement-pr, file-issues]
    if: always()
    steps:
      - name: 📊 Generate Summary
        run: |
          echo "## ✅ Workflow Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Event**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "[View Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY