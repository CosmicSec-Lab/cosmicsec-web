name: Auto-Sync to Organization Project
on:
  issues:
    types: [opened]

jobs:
  add-to-project:
    name: Add issue to project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1.0.1
        with:
          # Note: To use this across an organization, you MUST create a Personal Access Token (PAT)
          # with 'project' and 'repo' scopes, and save it as an Organization Secret named 'ORG_PROJECT_PAT'.
          github-token: ${{ secrets.ORG_PROJECT_PAT || secrets.GITHUB_TOKEN }}
          project-url: https://github.com/orgs/CosmicSec-Lab/projects/1
